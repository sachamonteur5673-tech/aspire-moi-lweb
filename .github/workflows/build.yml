name: Build Windows EXE
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build-windows:
    runs-on: windows-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp
 
      - name: Download yt-dlp.exe
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"
 
      - name: Download ffmpeg
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted" -Force
          $ffmpegDir = Get-ChildItem -Path "ffmpeg_extracted" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination "ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" -Destination "ffprobe.exe"
 
      - name: Build EXE with PyInstaller
        shell: powershell
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "AspireMoiLweb" `
            --add-binary "yt-dlp.exe;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            AspireMoiLweb.py
 
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Aspire-moi-lweb-Windows
          path: dist/AspireMoiLweb.exe
          retention-days: 30
 
