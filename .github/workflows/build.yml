name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install yt-dlp

      - name: Download yt-dlp.exe
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o yt-dlp.exe

      - name: Download ffmpeg
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          copy ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe
          copy ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe ffprobe.exe

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "Aspire moi l'web" `
            --add-binary "yt-dlp.exe;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            AspireMoiLweb.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aspire-moi-lweb-Windows
          path: "dist/Aspire moi l'web.exe"
          retention-days: 30
